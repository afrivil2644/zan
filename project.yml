name: Zan
options:
  bundleIdPrefix: dev.local
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "0.9.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Ad-hoc signing by default so anyone can clone and build with no account.
    # Tradeoff: Accessibility / Input Monitoring grants reset on each rebuild.
    # For stable permissions, build with your own identity, e.g.:
    #   xcodebuild ... CODE_SIGN_IDENTITY="Developer ID Application" DEVELOPMENT_TEAM=XXXXXXXXXX
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: NO

targets:
  Zan:
    type: application
    platform: macOS
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
        product: WhisperKit
    sources:
      - path: Zan/Sources
    info:
      path: Zan/Info.plist
      properties:
        CFBundleName: Zan
        CFBundleDisplayName: Zan
        # LSUIElement = menu-bar agent: no Dock icon, no main window.
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSMicrophoneUsageDescription: "Zan records your microphone only while you hold or toggle the dictation hotkey, to transcribe your speech."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.zan
        PRODUCT_NAME: Zan
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        COMBINE_HIDPI_IMAGES: YES
