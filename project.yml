name: Zan
options:
  bundleIdPrefix: com.futodi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  # WhisperKit (on-device transcription) is OPT-IN. The default build omits it
  # so a clone stays lightweight. To enable, regenerate with the overlay spec:
  #   xcodegen generate --spec project-whisperkit.yml
  # See README → "Optional: on-device transcription".

settings:
  base:
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    # Ad-hoc signing by default so anyone can clone and build with no account.
    # Tradeoff: Accessibility / Input Monitoring grants reset on each rebuild.
    # For stable permissions, build with your own identity, e.g.:
    #   xcodebuild ... CODE_SIGN_IDENTITY="Developer ID Application" DEVELOPMENT_TEAM=XXXXXXXXXX
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: NO

targets:
  Zan:
    type: application
    platform: macOS
    dependencies:
      - package: KeyboardShortcuts
    sources:
      - path: Zan/Sources
      - path: Zan/Resources
    info:
      path: Zan/Info.plist
      properties:
        CFBundleName: Zan
        CFBundleDisplayName: Zan
        # XcodeGen doesn't auto-fill these from MARKETING_VERSION; set explicitly.
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "2"
        # LSUIElement = menu-bar agent: no Dock icon, no main window.
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSMicrophoneUsageDescription: "Zan records your microphone only while you hold or toggle the dictation hotkey, to transcribe your speech."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.futodi.zan
        PRODUCT_NAME: Zan
        CODE_SIGN_ENTITLEMENTS: Zan/Zan.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
